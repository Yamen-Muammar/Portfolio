<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Loading...</title>
    <meta name="description" content="Personal Portfolio">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav class="glass-nav">
        <a href="#hero" class="nav-brand" id="navName">...</a>
        <div class="nav-links">
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <main>
        <section id="hero" class="hero-section">
            <div class="hero-content-wrapper">
                <div class="hero-content">
                    <p class="greeting">Hi, my name is</p>
                    <h1 id="heroName" class="glitch-text">Loading...</h1>
                    <h2 id="heroTitle" class="gradient-text">Developer</h2>
                    <p id="heroBio" class="bio">...</p>
                    <div class="hero-actions">
                        <a href="#projects" class="btn primary-btn">View My Work</a>
                        <a href="#contact" class="btn secondary-btn">Contact Me</a>
                    </div>
                </div>
                <div class="hero-image">
                    <img src="profile_pic.png" alt="Profile Picture" class="profile-pic">
                </div>
            </div>
        </section>

        <section id="about" class="fade-in">
            <div class="section-container glass-card">
                <h2>About Me</h2>
                <p id="aboutBio">...</p>
            </div>
        </section>

        <section id="skills" class="fade-in">
            <div class="section-container">
                <h2>My Skills</h2>
                <div id="skillsList" class="skills-grid">
                    <!-- Skills will be injected here -->
                </div>
            </div>
        </section>

        <section id="projects" class="fade-in">
            <div class="section-container">
                <h2>Featured Projects</h2>
                <div id="projectsList" class="projects-grid">
                    <!-- Projects will be injected here -->
                </div>
            </div>
        </section>

        <section id="contact" class="fade-in">
            <div class="section-container glass-card contact-card">
                <h2>Get In Touch</h2>
                <p>I'm always open to new opportunities and interesting projects.</p>
                <div class="social-links" id="socialLinks">
                    <!-- Socials injected here -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> <span id="footerName"></span>. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
